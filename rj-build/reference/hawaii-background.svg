<svg class="leaf-bg" viewBox="0 0 800 2200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- TOP LEFT large palm leaf -->
  <g class="leaf-animated" style="animation-delay:0s">
    <path d="M-30 20 Q80 60 160 200 Q100 180 60 140 Q90 200 150 260 Q80 220 30 180 Q70 260 120 320 Q40 270 -10 220 Q40 320 80 400 Q-10 340 -50 280 Z" fill="#1a5c1a" opacity="0.7"/>
    <path d="M-50 10 Q60 80 140 250 Q70 210 20 160" fill="none" stroke="#2d8c2d" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- TOP RIGHT botanical -->
  <g class="leaf-animated" style="animation-delay:1s; transform-origin: 750px 0px">
    <path d="M850 -10 Q720 50 680 180 Q740 160 780 120 Q750 190 700 250 Q760 230 810 190 Q770 270 730 330 Q800 290 840 240 Q800 340 760 420 Q840 360 880 300 Z" fill="#1a5c1a" opacity="0.65"/>
    <path d="M860 0 Q730 70 680 240" fill="none" stroke="#2d8c2d" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Red hibiscus top left -->
  <g transform="translate(80, 110)">
    <ellipse rx="22" ry="38" fill="#c41e3a" opacity="0.85" transform="rotate(0)"/>
    <ellipse rx="22" ry="38" fill="#c41e3a" opacity="0.85" transform="rotate(72)"/>
    <ellipse rx="22" ry="38" fill="#c41e3a" opacity="0.85" transform="rotate(144)"/>
    <ellipse rx="22" ry="38" fill="#c41e3a" opacity="0.85" transform="rotate(216)"/>
    <ellipse rx="22" ry="38" fill="#c41e3a" opacity="0.85" transform="rotate(288)"/>
    <circle r="12" fill="#d4af37" opacity="0.9"/>
    <circle r="5" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Purple flower top right -->
  <g transform="translate(700, 90)">
    <ellipse rx="18" ry="32" fill="#6a0dad" opacity="0.8" transform="rotate(0)"/>
    <ellipse rx="18" ry="32" fill="#9b30ff" opacity="0.8" transform="rotate(60)"/>
    <ellipse rx="18" ry="32" fill="#6a0dad" opacity="0.8" transform="rotate(120)"/>
    <ellipse rx="18" ry="32" fill="#9b30ff" opacity="0.8" transform="rotate(180)"/>
    <ellipse rx="18" ry="32" fill="#6a0dad" opacity="0.8" transform="rotate(240)"/>
    <ellipse rx="18" ry="32" fill="#9b30ff" opacity="0.8" transform="rotate(300)"/>
    <circle r="10" fill="#d4af37" opacity="0.9"/>
  </g>
  <!-- Mid-left leaves -->
  <g class="leaf-animated" style="animation-delay:2s; transform-origin:0px 900px">
    <path d="M-60 800 Q40 820 100 950 Q50 930 10 900 Q50 960 90 1030 Q20 990 -20 960 Q30 1060 60 1140 Q-30 1080 -70 1020 Z" fill="#1a5c1a" opacity="0.55"/>
  </g>
  <!-- Mid-right small red flower -->
  <g transform="translate(740, 780)">
    <ellipse rx="16" ry="28" fill="#8b0000" opacity="0.75" transform="rotate(0)"/>
    <ellipse rx="16" ry="28" fill="#c41e3a" opacity="0.75" transform="rotate(72)"/>
    <ellipse rx="16" ry="28" fill="#8b0000" opacity="0.75" transform="rotate(144)"/>
    <ellipse rx="16" ry="28" fill="#c41e3a" opacity="0.75" transform="rotate(216)"/>
    <ellipse rx="16" ry="28" fill="#8b0000" opacity="0.75" transform="rotate(288)"/>
    <circle r="8" fill="#d4af37" opacity="0.9"/>
  </g>
  <!-- Bottom right leaves -->
  <g class="leaf-animated" style="animation-delay:0.5s; transform-origin:800px 1900px">
    <path d="M870 1880 Q750 1910 700 2040 Q760 2010 800 1980 Q760 2050 720 2120 Q790 2080 830 2040 Q790 2140 760 2220 Q840 2160 870 2100 Z" fill="#2d8c2d" opacity="0.6"/>
  </g>
  <!-- Bottom left flower cluster -->
  <g transform="translate(60, 2000)">
    <ellipse rx="14" ry="24" fill="#9b30ff" opacity="0.7" transform="rotate(0)"/>
    <ellipse rx="14" ry="24" fill="#d4a0ff" opacity="0.7" transform="rotate(72)"/>
    <ellipse rx="14" ry="24" fill="#9b30ff" opacity="0.7" transform="rotate(144)"/>
    <ellipse rx="14" ry="24" fill="#d4a0ff" opacity="0.7" transform="rotate(216)"/>
    <ellipse rx="14" ry="24" fill="#9b30ff" opacity="0.7" transform="rotate(288)"/>
    <circle r="7" fill="#d4af37"/>
  </g>
  <!-- Scattered petals -->
  <ellipse cx="200" cy="350" rx="6" ry="10" fill="#c41e3a" opacity="0.4" transform="rotate(30, 200, 350)"/>
  <ellipse cx="600" cy="500" rx="5" ry="9" fill="#9b30ff" opacity="0.35" transform="rotate(-20, 600, 500)"/>
  <ellipse cx="150" cy="1200" rx="7" ry="12" fill="#c41e3a" opacity="0.3" transform="rotate(45, 150, 1200)"/>
  <ellipse cx="680" cy="1400" rx="5" ry="9" fill="#6a0dad" opacity="0.4" transform="rotate(-30, 680, 1400)"/>
  <ellipse cx="400" cy="600" rx="4" ry="7" fill="#d4af37" opacity="0.25" transform="rotate(60, 400, 600)"/>
</svg>
